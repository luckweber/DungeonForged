[/Script/GameplayAbilities.AbilitySystemGlobals]
+AbilitySystemGlobalsClassName="/Script/DungeonForged.DFAbilitySystemGlobals"
+GameplayCueNotifyPaths=/Game/ThirdPerson

; -----------------------------------------------------------------------------
; Tambem: Edit -> Project Settings -> Dungeon Forged | Class Selection (Developer
; Settings) sobrescreve estas chaves quando preenchido (ver UDFClassSelectionDeveloperSettings).
; UDFClassSelectionSubsystem — secao = nome da classe sem prefixo U (UDFClass… -> DFClass…).
; TSubclassOf / soft class no .ini: use sempre a classe GERADA do Blueprint (sufixo _C).
; WorldSubsystem precisa de LoadConfig() em runtime (ja feito em C++); o Editor pode
; mostrar os campos vazios ate o Play carregar DefaultGame.ini.
