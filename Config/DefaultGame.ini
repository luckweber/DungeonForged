[/Script/EngineSettings.GeneralProjectSettings]
ProjectID=6BB4EBF9420CF8C17E7AE993F1F9E11B
ProjectName=Third Person Game Template

[StartupActions]
bAddPacks=True
InsertPack=(PackSource="StarterContent.upack",PackName="StarterContent")

[SectionsToSave]
+Section=StartupActions
+Section=/Script/GameplayAbilities.AbilitySystemGlobals

; Aura GAS course pattern (GameplayAbilitySystem_Aura / DefaultGame.ini):
; - AbilitySystemGlobalsClassName: project subclass of UAbilitySystemGlobals
;   Em .ini use o nome **sem** o U do prefixo: UDFAbilitySystemGlobals -> DFAbilitySystemGlobals (não "UDF...").
; - GameplayCueNotifyPaths: valid /Game/... path (Aura uses a dedicated GameplayCueNotifies folder; ThirdPerson is fine for a template)
[/Script/GameplayAbilities.AbilitySystemGlobals]
+AbilitySystemGlobalsClassName="/Script/DungeonForged.DFAbilitySystemGlobals"
+GameplayCueNotifyPaths=/Game/ThirdPerson

; -----------------------------------------------------------------------------
; Tambem: Edit -> Project Settings -> Dungeon Forged | Class Selection (Developer
; Settings) sobrescreve estas chaves quando preenchido (ver UDFClassSelectionDeveloperSettings).
; UDFClassSelectionSubsystem — secao = nome da classe sem prefixo U (UDFClass… -> DFClass…).
; TSubclassOf / soft class no .ini: use sempre a classe GERADA do Blueprint (sufixo _C).
; WorldSubsystem precisa de LoadConfig() em runtime (ja feito em C++); o Editor pode
; mostrar os campos vazios ate o Play carregar DefaultGame.ini.
; -----------------------------------------------------------------------------
[/Script/DungeonForged.DFClassSelectionSubsystem]
; False = pawn visível no mundo (sem Scene Capture); True = Render Target no centro do WBP.
bPreviewUsesSceneCapture=False
ClassSelectionWidgetSoftPath=/Game/DungeonForged/UI/ClassSelection/WBP_ClassSelection.WBP_ClassSelection_C
; Opcional se nao quiser depender apenas do SoftPath acima:
;ClassSelectionWidgetClass=/Game/DungeonForged/UI/ClassSelection/WBP_ClassSelection.WBP_ClassSelection_C
; Recomendado: Blueprint filho de ADFClassPreviewCharacter (leve). Herói completo também funciona.
PreviewPawnClass=/Game/DungeonForged/Character/Hero/BP_HeroCharacter.BP_HeroCharacter_C
